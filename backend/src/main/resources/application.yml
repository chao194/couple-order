server:
  port: 8080

cloudflare:
  d1:
    account-id: ${D1_ACCOUNT_ID}
    database-id: ${D1_DATABASE_ID}
    api-token: ${D1_API_TOKEN}

spring:
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: couple-order-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256!!
  expiration: 86400000
